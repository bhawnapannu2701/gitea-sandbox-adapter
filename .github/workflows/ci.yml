name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -m "not integration"
      - name: Ruff
        run: python -m ruff check src tests scripts
      - name: mypy
        run: python -m mypy

  docker-integration:
    name: Linux Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify Docker Compose V2
        run: docker compose version
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Generate local CI .env
        run: |
          python - <<'PY'
          from pathlib import Path
          import secrets
          values = {
              "COMPOSE_PROJECT_NAME": "gitea_sandbox_adapter_ci",
              "GITEA_IMAGE": "docker.gitea.com/gitea:1.27.0-rootless",
              "POSTGRES_IMAGE": "docker.io/library/postgres:16.14-bookworm",
              "GITEA_HTTP_PORT": "3000",
              "GITEA_SSH_PORT": "2222",
              "POSTGRES_DB": "gitea",
              "POSTGRES_USER": "gitea",
              "POSTGRES_PASSWORD": secrets.token_urlsafe(32),
              "GITEA_ADMIN_USER": "sandbox-admin",
              "GITEA_ADMIN_PASSWORD": secrets.token_urlsafe(32),
              "GITEA_ADMIN_EMAIL": "sandbox-admin@example.invalid",
              "GITEA_TOKEN_NAME": "gitea-sandbox-phase-2-ci",
              "GITEA_START_TIMEOUT": "240",
              "GITEA_STOP_TIMEOUT": "90",
              "GITEA_HEALTH_POLL_INTERVAL": "3",
              "GITEA_HTTP_TIMEOUT": "20",
              "GITEA_HTTP_RETRIES": "3",
              "GITEA_BROWSER_TIMEOUT": "30000",
          }
          Path(".env").write_text(
              "".join(f"{key}={value}\n" for key, value in values.items()),
              encoding="utf-8",
          )
          PY
      - name: Compose config
        run: docker compose --env-file .env -f compose.yaml config --quiet
      - name: Start sandbox
        run: gitea-sandbox start
      - name: Populate deterministic fixture
        run: gitea-sandbox populate
      - name: API validation
        run: gitea-sandbox validate --api-only
      - name: Snapshot
        run: gitea-sandbox snapshot
      - name: Restore snapshot
        run: |
          SNAPSHOT_DIR="$(find snapshots -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          gitea-sandbox restore "$SNAPSHOT_DIR" --force --no-safety-snapshot
      - name: Integration pytest
        env:
          GITEA_SANDBOX_RUN_INTEGRATION: "1"
        run: python -m pytest -m integration
      - name: Diagnostics on failure
        if: failure()
        run: |
          mkdir -p diagnostics
          gitea-sandbox diagnose --json > diagnostics/diagnose.json || true
          docker compose --env-file .env -f compose.yaml -p gitea_sandbox_adapter_ci logs --no-color --tail 200 > diagnostics/compose.raw.log 2> /dev/null || true
          python scripts/redact_ci_log.py diagnostics/compose.raw.log diagnostics/compose.redacted.log
          rm -f diagnostics/compose.raw.log
      - name: Remove raw diagnostics
        if: always()
        shell: bash
        run: rm -f diagnostics/*.raw.log
      - name: Upload sanitized diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitized-diagnostics
          path: |
            diagnostics/diagnose.json
            diagnostics/compose.redacted.log
            !diagnostics/*.raw.log
            !.env
            !.gitea-sandbox/**
            !snapshots/**
            !**/*.dump
            !**/*.tar.gz
            !**/*token*
            !**/*cookie*
            !**/storage-state*.json
          if-no-files-found: ignore
      - name: Stop sandbox
        if: always()
        run: docker compose --env-file .env -f compose.yaml -p gitea_sandbox_adapter_ci down
