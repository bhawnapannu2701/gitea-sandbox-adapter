name: ${COMPOSE_PROJECT_NAME:-gitea_sandbox_adapter}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.io/library/postgres:16.14-bookworm}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sandbox
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  gitea:
    image: ${GITEA_IMAGE:-docker.gitea.com/gitea:1.27.0-rootless}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      GITEA__database__USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__SHOW_REGISTRATION_BUTTON: "false"
      GITEA__server__APP_DATA_PATH: /var/lib/gitea
      GITEA__server__DOMAIN: localhost
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: http://localhost:${GITEA_HTTP_PORT:-3000}/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__SSH_LISTEN_PORT: "2222"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__repository__DEFAULT_BRANCH: main
      GITEA__api__ENABLE_SWAGGER: "true"
      GITEA__log__MODE: console
      GITEA__log__LEVEL: info
      GITEA__repository__ENABLE_PUSH_CREATE_USER: "false"
      GITEA__repository__ENABLE_PUSH_CREATE_ORG: "false"
      GITEA__cron__ENABLED: "false"
      GITEA__session__PROVIDER: file
      GITEA__cache__ADAPTER: memory
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:2222"
    volumes:
      - gitea_data:/var/lib/gitea
      - gitea_config:/etc/gitea
    networks:
      - sandbox
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

networks:
  sandbox:
    internal: false

volumes:
  postgres_data:
  gitea_data:
  gitea_config:
